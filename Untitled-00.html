<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffdeeb;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .img-wrapper img, .img-wrapper video {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        h1 { color: #d63384; font-size: 22px; }
        #status-text { color: #ff4d6d; font-weight: bold; height: 20px; margin-bottom: 20px; }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        #yesBtn { background-color: #ff4d6d; color: white; z-index: 100; }
        #noBtn { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="container">
        <div id="content">
            <div class="img-wrapper">
                <img id="main-display" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/KztT2c4u8mYYUiCiZq/giphy.gif">
            </div>

            <h1 id="headline">Will you be my Valentine, [Name]? ❤️</h1>
            <p id="status-text"></p>

            <div class="buttons">
                <button id="yesBtn" onclick="sayYes()">Yes</button>
                <button id="noBtn" onclick="handleNo()">No</button>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        let noCount = 0;

        // 2. THE ANGRY REACTION LIST
        const reactions = [
            { text: "Wait... what?", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/11tTN7q4LpRFCw/giphy.gif" }, // Anger
            { text: "Think about the memories! 🥺", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/26gR2fIIUs68mIdK8/giphy.gif" }, // Crying
            { text: "TRY AGAIN! 😤", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l1J9u3TZfpmeDLkD6/giphy.gif" }, // Fire Anger
            { text: "I'm not playing with you... 🔪", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKSjPqcK03S7O7u/giphy.gif" }
        ];

        function handleNo() {
            // TRY TO PLAY MUSIC (Browsers allow it after a click)
            music.play().catch(e => console.log("Music waiting for interaction"));

            const display = document.getElementById('main-display');
            const status = document.getElementById('status-text');
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');

            // Change Text and Image
            let current = reactions[noCount % reactions.length];
            display.src = current.img;
            status.innerText = current.text;

            // Move the No button randomly
            noBtn.style.position = "absolute";
            noBtn.style.left = Math.random() * 70 + "vw";
            noBtn.style.top = Math.random() * 70 + "vh";

            // Make Yes button HUGE
            noCount++;
            yesBtn.style.transform = `scale(${1 + (noCount * 0.4)})`;
        }

        function sayYes() {
            music.play(); // Ensure music plays on Yes too
            const container = document.getElementById('container');
            
            // 3. SUCCESS SCREEN WITH VIDEO
            container.innerHTML = `
                <h1>YAY! BEST DAY EVER! 🥰</h1>
                <div class="img-wrapper">
                    <video autoplay loop muted playsinline>
                        <source src="video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <p>I love you so much!</p>
            `;
        }
    </script>
</body>
</html>
