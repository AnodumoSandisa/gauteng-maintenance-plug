<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecOps Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11;
            --card-bg: #15191d;
            --accent: #2ecc71; /* ServiceNow Green */
            --danger: #e74c3c;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.8s ease-in;
        }

        /* Dashboard Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .metadata-text {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
        }

      
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .stat-value { font-size: 2rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

      
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #1c2128; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; padding: 15px; text-align: left; }
        td { padding: 15px; border-top: 1px solid var(--border); font-size: 0.9rem; }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .status-open { background: rgba(231, 76, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .status-closed { background: rgba(46, 204, 113, 0.1); color: var(--accent); border: 1px solid var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>SEC-OPS COMMAND CENTER</h1>
                <div class="metadata-text" id="meta-scan-time">System initializing...</div>
            </div>
            <div class="metadata-text" id="meta-target">TARGET: ---</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Ports Scanned</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-open" style="color: var(--danger);">0</span>
                <span class="stat-label">Active Risks</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-health" style="color: var(--accent);">--%</span>
                <span class="stat-label">System Health</span>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Access Port</th>
                        <th>Network Service</th>
                        <th>Status</th>
                        <th>Action Required</th>
                    </tr>
                </thead>
                <tbody id="table-content">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        //  fetch and process data
        async function loadDashboard() {
            try {
                const response = await fetch('service_now_payload.json');
                const data = await response.json();

                // 1. Update Header & Stats
                document.getElementById('meta-scan-time').innerText = `LAST UPDATE: ${data.scan_timestamp}`;
                document.getElementById('meta-target').innerText = `ENDPOINT: ${data.target_system}`;
                
                const totalPorts = data.vulnerabilities.length;
                const openPorts = data.vulnerabilities.filter(v => v.state === 'open').length;
                const healthScore = Math.round(((totalPorts - openPorts) / totalPorts) * 100);

                document.getElementById('stat-total').innerText = totalPorts;
                document.getElementById('stat-open').innerText = openPorts;
                document.getElementById('stat-health').innerText = `${healthScore}%`;

              
                const tbody = document.getElementById('table-content');
                tbody.innerHTML = data.vulnerabilities.map(item => `
                    <tr>
                        <td style="font-family: 'JetBrains Mono'; color: var(--accent);">#${item.port}</td>
                        <td><strong>${item.service.toUpperCase()}</strong></td>
                        <td>
                            <span class="badge ${item.state === 'open' ? 'status-open' : 'status-closed'}">
                                ${item.state.toUpperCase()}
                            </span>
                        </td>
                        <td style="color: var(--text-dim); font-size: 0.8rem;">
                            ${item.state === 'open' ? '⚠️ Create ServiceNow Incident' : '✓ No Action'}
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error("Dashboard error:", error);
                document.querySelector('.header h1').innerText = "DATA SOURCE NOT FOUND";
            }
        }

        loadDashboard();
    </script>
</body>
</html>
